# APCPDCL (Central) — LIVE: performanceDailyReportSection1 / sectionwiseDailyPowerSection.
# The scraper pre-computes FeederName / FeederId / Voltage / SubDiv / Status;
# this config maps those + the portal's own columns onto the schema.
discom: APCPDCL
date_dayfirst: true            # Outage Start Time is DD-MM-YYYY HH:MM:SS

field_map:
  district: "Circle Name"          # already a full district name (e.g. PALNADU)
  division: "Division Name"
  subdivision: "SubDiv"            # phone-suffix stripped by the scraper
  section: "Section Name"
  feeder_name: "FeederName"
  feeder_id: "FeederId"
  voltage_class: "Voltage"
  cause: "Interruption Reason (Entered in AE Login)"
  outage_start: "Outage Start Time"
  status: "Status"

value_map:
  status:
    OPEN: ongoing
