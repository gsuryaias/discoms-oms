# APSPDCL (Southern) column dialect -> canonical schema.
discom: APSPDCL
date_dayfirst: true            # portal prints DD-MM-YYYY

field_map:
  district: "Circle"
  division: "Division"
  subdivision: "Sub-Division"
  section: "Section"
  feeder_name: "Feeder"
  voltage_class: "Volt"
  outage_type: "Nature"
  cause: "Cause of Interruption"
  affected_consumers: "No. of Services"
  affected_villages: "Villages Affected"
  outage_start: "Off Time"
  expected_restoration: "Expected On Time"
  restored_at: "On Time"
  status: "Stage"

value_map:
  status:
    "OFF": ongoing
    "ON": restored
  outage_type:
    Unplanned: unplanned
    Planned: planned
  voltage_class:
    "11KV": 11kV
    "33KV": 33kV
