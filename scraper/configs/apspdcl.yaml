# APSPDCL (Southern) — LIVE: performanceDailyReportSection / sectionwiseDailyPowerSection.
# Same OMS app as CPDCL; columns differ slightly (Circle/Division, combined
# "Sub Division/ Section"). Scraper pre-computes FeederName/FeederId/Voltage/Status.
discom: APSPDCL
date_dayfirst: true

field_map:
  district: "Circle"               # full district name (e.g. KURNOOL)
  division: "Division"
  subdivision: "Sub Division/ Section"
  feeder_name: "FeederName"
  feeder_id: "FeederId"
  voltage_class: "Voltage"
  cause: "Interruption Reason (Entered in AE Login)"
  outage_start: "Outage Start Time"
  status: "Status"

value_map:
  status:
    OPEN: ongoing
