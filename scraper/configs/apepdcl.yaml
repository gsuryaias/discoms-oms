# APEPDCL (Eastern) — LIVE: HTServicesLiveInterruptions table.
# The scraper (discoms/apepdcl.py) pre-computes District / Status / Restored
# Time / Voltage / Services; this config just maps those onto the schema.
discom: APEPDCL
date_dayfirst: true            # portal prints DD-MM-YYYY HH:MM:SS

field_map:
  district: "District"             # full name (scraper expands the circle code)
  division: "Division"
  subdivision: "Sub-Division Name"
  section: "Section"
  feeder_name: "Short Name"        # HT consumer / installation name
  feeder_id: "Consumer Number"
  voltage_class: "Voltage"
  affected_consumers: "Services"   # 1 per interrupted HT service
  outage_start: "Outage Start Time"
  restored_at: "Restored Time"
  status: "Status"

value_map:
  status:
    OPEN: ongoing
    CLOSED: restored
