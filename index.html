<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AP DISCOMs Outage Dashboard</title>
  <!-- The dashboard lives in /docs (GitHub Pages can also serve that folder
       directly). This root redirect makes the project URL work whether Pages
       is configured to serve from "/" or "/docs". -->
  <meta http-equiv="refresh" content="0; url=./docs/" />
  <link rel="canonical" href="./docs/" />
  <script>location.replace("./docs/" + location.search + location.hash);</script>
</head>
<body>
  <p>Redirecting to the <a href="./docs/">AP DISCOMs Outage Dashboard</a>…</p>
</body>
</html>
